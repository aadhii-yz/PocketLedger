name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd frontend
          npm install --legacy-peer-deps
          npm run build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build backend
        run: |
          cp -r frontend/build backend/pb_public
          cd backend
          go mod tidy
          go build -ldflags="-s -w" -o pocketledger .

      - name: Package release
        run: |
          mkdir release
          cp backend/pocketledger release/
          cp -r backend/pb_public release/
          tar -czf pocketledger-linux-amd64.tar.gz -C release .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          files: pocketledger-linux-amd64.tar.gz
