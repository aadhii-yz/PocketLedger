name: Build Companion App

on:
  workflow_dispatch:

jobs:
  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: companion_app/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Install frontend deps
        working-directory: companion_app
        run: npm ci

      - name: Init Tauri Android project
        working-directory: companion_app
        run: npm run tauri -- android init

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build Android APK
        working-directory: companion_app
        run: npm run tauri -- android build --apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pocketledger-print-android
          path: companion_app/src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
          retention-days: 30

  build-windows:
    name: Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: companion_app/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        working-directory: companion_app
        run: npm ci

      - name: Build frontend
        working-directory: companion_app
        run: npm run build

      - name: Build Windows installer
        working-directory: companion_app
        run: npm run tauri -- build

      - name: Verify Windows bundle exists
        working-directory: companion_app
        shell: pwsh
        run: |
          $bundle = "src-tauri/target/release/bundle"
          $artifacts = Get-ChildItem -Path $bundle -Recurse -Include *.exe,*.msi -ErrorAction SilentlyContinue
          if (-not $artifacts) {
            Write-Error "No .exe/.msi produced under $bundle — Windows bundling failed."
            exit 1
          }
          $artifacts | ForEach-Object { Write-Host "Built: $($_.FullName)" }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: pocketledger-print-windows
          path: |
            companion_app/src-tauri/target/release/bundle/nsis/*.exe
            companion_app/src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30

  release:
    name: Publish Release
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version from tauri.conf.json
        id: version
        run: |
          VERSION=$(jq -r '.version' companion_app/src-tauri/tauri.conf.json)
          echo "version=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: pocketledger-print-android
          path: release-assets/android

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: pocketledger-print-windows
          path: release-assets/windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Companion App ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            release-assets/android/*.apk
            release-assets/windows/*.exe
            release-assets/windows/*.msi
