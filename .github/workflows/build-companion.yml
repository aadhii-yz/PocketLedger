name: Build Companion App

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.2.0)'
        required: true

jobs:
  # ── Android APK ─────────────────────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Accept Android SDK licences
        run: yes | flutter doctor --android-licenses || true

      - name: Generate platform boilerplate
        working-directory: companion_app
        run: |
          flutter create . \
            --project-name pocketledger_print \
            --org com.pocketledger \
            --platforms android \
            --no-pub
          git checkout -- lib/ pubspec.yaml

      - name: Patch AndroidManifest.xml
        working-directory: companion_app
        run: python3 patch_manifest.py

      - name: Build release APK
        working-directory: companion_app
        run: |
          flutter pub get
          flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: pocketledger-print-android
          path: companion_app/build/app/outputs/flutter-apk/app-release.apk

  # ── Windows exe ─────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate platform boilerplate
        working-directory: companion_app
        shell: bash
        run: |
          flutter create . \
            --project-name pocketledger_print \
            --org com.pocketledger \
            --platforms windows \
            --no-pub
          git checkout -- lib/ pubspec.yaml

      - name: Build release Windows exe
        working-directory: companion_app
        run: |
          flutter pub get
          flutter build windows --release

      - name: Zip Windows build
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "companion_app/build/windows/x64/runner/Release/*" `
            -DestinationPath "pocketledger-print-windows.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: pocketledger-print-windows
          path: pocketledger-print-windows.zip

  # ── GitHub Release ───────────────────────────────────────────────────────────
  release:
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pocketledger-print-android
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: pocketledger-print-windows
          path: dist/

      - name: Rename Android APK
        run: mv dist/app-release.apk dist/pocketledger-print-${{ github.event.inputs.version }}-android.apk

      - name: Rename Windows zip
        run: mv dist/pocketledger-print-windows.zip dist/pocketledger-print-${{ github.event.inputs.version }}-windows.zip

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: PocketLedger Companion ${{ github.event.inputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/pocketledger-print-${{ github.event.inputs.version }}-android.apk
            dist/pocketledger-print-${{ github.event.inputs.version }}-windows.zip
