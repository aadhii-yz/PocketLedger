name: Build Companion App

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.2.0). Leave empty to build artifacts without creating a release.'
        required: false
      build_android:
        description: 'Build Android APK'
        type: boolean
        default: true
      build_windows:
        description: 'Build Windows exe'
        type: boolean
        default: true
      build_linux:
        description: 'Build Linux binary'
        type: boolean
        default: true

jobs:
  # ── Android APK ─────────────────────────────────────────────────────────────
  build-android:
    if: ${{ inputs.build_android }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Accept Android SDK licences
        run: yes | flutter doctor --android-licenses || true

      - name: Generate platform boilerplate
        working-directory: companion_app
        run: |
          flutter create . \
            --project-name pocketledger_print \
            --org com.pocketledger \
            --platforms android \
            --no-pub
          git checkout -- lib/ pubspec.yaml

      - name: Patch AndroidManifest.xml
        working-directory: companion_app
        run: python3 patch_manifest.py

      - name: Build release APK
        working-directory: companion_app
        run: |
          flutter pub get
          flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: pocketledger-print-android
          path: companion_app/build/app/outputs/flutter-apk/app-release.apk

  # ── Windows exe ─────────────────────────────────────────────────────────────
  build-windows:
    if: ${{ inputs.build_windows }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Pub\Cache
          key: pub-windows-${{ hashFiles('companion_app/pubspec.lock') }}
          restore-keys: pub-windows-

      - name: Generate platform boilerplate
        working-directory: companion_app
        shell: bash
        run: |
          flutter create . \
            --project-name pocketledger_print \
            --org com.pocketledger \
            --platforms windows \
            --no-pub
          git checkout -- lib/ pubspec.yaml

      - name: Cache Windows build output
        uses: actions/cache@v4
        with:
          path: companion_app/build/windows
          key: build-windows-${{ hashFiles('companion_app/pubspec.lock') }}
          restore-keys: build-windows-

      - name: Build release Windows exe
        working-directory: companion_app
        run: |
          flutter pub get
          flutter build windows --release

      - name: Bundle VC++ runtime DLLs
        shell: pwsh
        run: |
          # Flutter release exes link against the MSVC runtime. Ship the runtime
          # DLLs next to the exe so the app runs on machines without the VC++
          # Redistributable installed (fresh/old Windows shows VCRUNTIME140_1.dll
          # not found). App-local deployment of these DLLs is permitted by MS.
          $dest = "companion_app/build/windows/x64/runner/Release"
          foreach ($dll in @('msvcp140.dll', 'vcruntime140.dll', 'vcruntime140_1.dll')) {
            Copy-Item "$env:SystemRoot\System32\$dll" -Destination $dest -Force
            Write-Host "Bundled $dll"
          }

      - name: Build MSIX package
        working-directory: companion_app
        shell: pwsh
        run: |
          $raw = "${{ github.event.inputs.version }}".TrimStart('v')
          $msixVer = if ($raw) { "$raw.0" } else { "0.0.0.0" }
          dart run msix:create --version $msixVer

      - name: Zip Windows build
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "companion_app/build/windows/x64/runner/Release/*" `
            -DestinationPath "pocketledger-print-windows.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: pocketledger-print-windows
          path: pocketledger-print-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: pocketledger-print-windows-msix
          path: companion_app/pocketledger_print.msix

  # ── Linux binary ─────────────────────────────────────────────────────────────
  build-linux:
    if: ${{ inputs.build_linux }}
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            git curl unzip tar which jq \
            base-devel clang cmake ninja pkg-config \
            gtk3 libepoxy \
            wpewebkit libwpe wpebackend-fdo \
            libsecret wayland wayland-protocols
          git config --global --add safe.directory '*'

      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate platform boilerplate
        working-directory: companion_app
        run: |
          flutter create . \
            --project-name pocketledger_print \
            --org com.pocketledger \
            --platforms linux \
            --no-pub
          git checkout -- lib/ pubspec.yaml

      - name: Build release Linux binary
        working-directory: companion_app
        run: |
          flutter pub get
          flutter build linux --release

      - name: Archive Linux build
        run: |
          tar -czf pocketledger-print-linux.tar.gz \
            -C companion_app/build/linux/x64/release/bundle .

      - uses: actions/upload-artifact@v4
        with:
          name: pocketledger-print-linux
          path: pocketledger-print-linux.tar.gz

  # ── GitHub Release ───────────────────────────────────────────────────────────
  release:
    if: ${{ inputs.version != '' }}
    needs: [build-android, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        if: ${{ inputs.build_android }}
        with:
          name: pocketledger-print-android
          path: dist/

      - uses: actions/download-artifact@v4
        if: ${{ inputs.build_windows }}
        with:
          name: pocketledger-print-windows
          path: dist/

      - uses: actions/download-artifact@v4
        if: ${{ inputs.build_windows }}
        with:
          name: pocketledger-print-windows-msix
          path: dist/

      - uses: actions/download-artifact@v4
        if: ${{ inputs.build_linux }}
        with:
          name: pocketledger-print-linux
          path: dist/

      - name: Rename Android APK
        if: ${{ inputs.build_android }}
        run: mv dist/app-release.apk dist/pocketledger-print-${{ github.event.inputs.version }}-android.apk

      - name: Rename Windows zip
        if: ${{ inputs.build_windows }}
        run: mv dist/pocketledger-print-windows.zip dist/pocketledger-print-${{ github.event.inputs.version }}-windows.zip

      - name: Rename Windows MSIX
        if: ${{ inputs.build_windows }}
        run: mv dist/pocketledger_print.msix dist/pocketledger-print-${{ github.event.inputs.version }}-windows.msix

      - name: Rename Linux archive
        if: ${{ inputs.build_linux }}
        run: mv dist/pocketledger-print-linux.tar.gz dist/pocketledger-print-${{ github.event.inputs.version }}-linux.tar.gz

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: PocketLedger Companion ${{ github.event.inputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist/*
