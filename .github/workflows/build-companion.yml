name: Build Companion App

on:
  workflow_dispatch:

jobs:
  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: companion_app/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0"

      - name: Install frontend deps
        working-directory: companion_app
        run: npm ci

      - name: Init Tauri Android project
        working-directory: companion_app
        run: cargo tauri android init

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build Android APK
        working-directory: companion_app
        run: cargo tauri android build --apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pocketledger-print-android
          path: companion_app/src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
          retention-days: 30

  build-windows:
    name: Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: companion_app/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0"

      - name: Install frontend deps
        working-directory: companion_app
        run: npm ci

      - name: Build Windows installer
        working-directory: companion_app
        run: cargo tauri build

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: pocketledger-print-windows
          path: |
            companion_app/src-tauri/target/release/bundle/nsis/*.exe
            companion_app/src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30
