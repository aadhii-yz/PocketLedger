name: Build Companion App

on:
  workflow_dispatch:

jobs:
  # ── Android APK ─────────────────────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Accept Android SDK licences
        run: yes | flutter doctor --android-licenses || true

      - name: Generate platform boilerplate
        working-directory: companion_app
        run: |
          # --no-pub: skip pub get now (our pubspec.yaml comes back via git restore below)
          flutter create . \
            --project-name pocketledger_print \
            --org com.pocketledger \
            --platforms android \
            --no-pub
          # flutter create overwrites lib/main.dart and pubspec.yaml — restore ours
          git checkout -- lib/ pubspec.yaml

      - name: Patch AndroidManifest.xml
        working-directory: companion_app
        run: python3 patch_manifest.py

      - name: Build release APK
        working-directory: companion_app
        run: |
          flutter pub get
          flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: pocketledger-print-android
          path: companion_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  # ── Windows exe ─────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate platform boilerplate
        working-directory: companion_app
        shell: bash
        run: |
          flutter create . \
            --project-name pocketledger_print \
            --org com.pocketledger \
            --platforms windows \
            --no-pub
          git checkout -- lib/ pubspec.yaml

      - name: Build release Windows exe
        working-directory: companion_app
        run: |
          flutter pub get
          flutter build windows --release

      - uses: actions/upload-artifact@v4
        with:
          name: pocketledger-print-windows
          path: companion_app/build/windows/x64/runner/Release/
          retention-days: 30
