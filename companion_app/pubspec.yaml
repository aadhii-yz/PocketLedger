name: pocketledger_print
description: PocketLedger silent print companion
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  shared_preferences: ^2.3.2
  flutter_background_service: ^5.0.5
  flutter_local_notifications: ^18.0.1
  permission_handler: ^11.3.1
  window_manager: ^0.5.1
  flutter_inappwebview: ^6.2.0-beta.3
  wifi_iot: ^0.3.19
  package_info_plus: ^8.1.0
  http: ^1.2.0
  url_launcher: ^6.3.0
  open_filex: ^4.4.0
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  msix: ^3.16.0

flutter:
  uses-material-design: true

msix_config:
  display_name: PocketLedger Print
  publisher_display_name: PocketLedger
  identity_name: com.pocketledger.print
  sign_msix: false
  install_certificate: false
  capabilities: 'internetClient, privateNetworkClientServer'
